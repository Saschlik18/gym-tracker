<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gym Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js für Liniendiagramme -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased selection:bg-indigo-500 min-h-screen">

    <div class="max-w-md mx-auto min-h-screen p-4 flex flex-col justify-between relative">
        
        <!-- HEADER -->
        <header class="py-4 border-b border-slate-800 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <!-- Hamburger-Button (3 Balken) -->
                <button onclick="toggleMenu()" class="p-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <h1 class="text-xl font-bold tracking-tight text-indigo-400">💪 Gym Log</h1>
            </div>

            <div class="flex gap-2">
                <button onclick="exportData()" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg border border-slate-700">
                    JSON Export
                </button>
                <button onclick="clearAllData()" class="text-xs bg-red-950/40 hover:bg-red-900/60 px-3 py-1.5 rounded-lg border border-red-900/50 text-red-400">
                    Reset
                </button>
            </div>
        </header>

        <!-- NAV / SIDE-MENU OVERLAY -->
        <div id="side-menu" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden flex flex-col justify-between p-6">
            <div class="space-y-6">
                <div class="flex justify-between items-center border-b border-slate-800 pb-4">
                    <h2 class="text-lg font-bold text-indigo-400">Menü</h2>
                    <button onclick="toggleMenu()" class="text-slate-400 hover:text-white text-2xl font-bold">&times;</button>
                </div>
                <nav class="space-y-3">
                    <button onclick="showTab('tracker')" class="w-full text-left py-3 px-4 rounded-xl bg-slate-800 hover:bg-slate-700 font-semibold text-slate-200 flex items-center gap-3">
                        🏋️‍♂️ Training eintragen
                    </button>
                    <button onclick="showTab('stats')" class="w-full text-left py-3 px-4 rounded-xl bg-slate-800 hover:bg-slate-700 font-semibold text-slate-200 flex items-center gap-3">
                        📊 Statistiken & Auswertung
                    </button>
                </nav>
            </div>
            <p class="text-xs text-center text-slate-600">Gym Tracker v2.0</p>
        </div>

        <!-- MAIN CONTENT AREA -->
        <main class="flex-grow py-6 flex flex-col">
            
            <!-- VIEW 1: TRACKER AREA -->
            <div id="view-tracker" class="flex-grow flex flex-col justify-center">
                <!-- SCHRITT 1: ÜBUNG AUSWÄHLEN -->
                <div id="step-select-exercise" class="space-y-4">
                    <h2 class="text-lg font-medium text-slate-300">Welche Übung startest du?</h2>
                    <div class="space-y-2">
                        <label for="exercise-dropdown" class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Übung wählen</label>
                        <select id="exercise-dropdown" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-lg focus:outline-none focus:border-indigo-500 appearance-none text-slate-100">
                            <option value="Bankdrücken">🏋️‍♂️ Bankdrücken</option>
                            <option value="Kniebeugen">🦵 Kniebeugen</option>
                            <option value="Kreuzheben">🍑 Kreuzheben</option>
                            <option value="Klimmzüge">🦅 Klimmzüge</option>
                            <option value="Schulterdrücken">🚀 Schulterdrücken</option>
                        </select>
                    </div>
                    <button onclick="startExercise()" class="w-full bg-indigo-600 hover:bg-indigo-500 active:scale-98 transition text-white font-semibold rounded-xl p-4 text-lg mt-4 shadow-lg shadow-indigo-600/20">
                        Übung starten
                    </button>
                </div>

                <!-- SCHRITT 2: SATZ EINGEBEN (DYNAMISCH) -->
                <div id="step-log-set" class="hidden space-y-6">
                    <div class="bg-slate-800/50 border border-slate-800 p-4 rounded-xl flex justify-between items-center">
                        <div>
                            <span class="text-xs uppercase tracking-wider text-slate-500 font-semibold">Aktuelle Übung</span>
                            <h3 id="current-exercise-title" class="text-xl font-bold text-indigo-400">Übung</h3>
                        </div>
                        <div class="bg-indigo-600/10 border border-indigo-500/20 px-3 py-1 rounded-lg">
                            <span class="text-indigo-400 font-bold text-sm">Satz <span id="current-set-number">1</span></span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label for="weight-input" class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Gewicht (kg)</label>
                            <input type="number" id="weight-input" pattern="[0-9]*" inputmode="decimal" placeholder="0" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-2xl text-center focus:outline-none focus:border-indigo-500">
                        </div>
                        <div class="space-y-2">
                            <label for="reps-input" class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Wiederholungen</label>
                            <input type="number" id="reps-input" pattern="[0-9]*" inputmode="numeric" placeholder="0" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-2xl text-center focus:outline-none focus:border-indigo-500">
                        </div>
                    </div>

                    <div class="space-y-3 pt-4">
                        <button onclick="nextSet()" class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-98 transition text-white font-semibold rounded-xl p-4 text-lg shadow-lg shadow-emerald-600/10">
                            Nächster Satz
                        </button>
                        <button onclick="finishExercise()" class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 active:scale-98 transition text-slate-300 font-medium rounded-xl p-4 text-base">
                            Übung beenden & speichern
                        </button>
                        <button onclick="cancelExercise()" class="w-full bg-transparent hover:bg-slate-800/40 text-slate-500 hover:text-slate-400 text-sm font-medium rounded-xl p-2 transition">
                            ✕ Übung abbrechen (nicht speichern)
                        </button>
                    </div>
                </div>
            </div>

            <!-- VIEW 2: STATISTIKEN AREA -->
            <div id="view-stats" class="hidden space-y-6">
                <h2 class="text-xl font-bold text-slate-200">📊 Statistiken & Verläufe</h2>
                
                <div id="stats-container" class="space-y-6">
                    <!-- Wird dynamisch per JS befüllt -->
                </div>
            </div>

        </main>

        <!-- FOOTER / LOG-VORSCHAU -->
        <footer class="mt-auto pt-4 border-t border-slate-800">
            <div class="text-center">
                <p id="log-status" class="text-xs text-slate-500">Bisher keine Daten in dieser Session geloggt.</p>
            </div>
        </footer>

    </div>

    <!-- APP-LOGIK -->
    <script>
        let currentWorkout = {
            date: new Date().toISOString().split('T')[0],
            time: new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }),
            exercises: []
        };

        let activeExercise = { name: "", sets: [] };
        let setCounter = 1;

        const stepSelect = document.getElementById('step-select-exercise');
        const stepLogSet = document.getElementById('step-log-set');
        const currentExerciseTitle = document.getElementById('current-exercise-title');
        const currentSetNumber = document.getElementById('current-set-number');
        const weightInput = document.getElementById('weight-input');
        const repsInput = document.getElementById('reps-input');
        const logStatus = document.getElementById('log-status');
        const sideMenu = document.getElementById('side-menu');

        const viewTracker = document.getElementById('view-tracker');
        const viewStats = document.getElementById('view-stats');

        let activeCharts = {}; // Speichert Chart-Instanzen zum späteren Clean-up

        function toggleMenu() {
            sideMenu.classList.toggle('hidden');
        }

        function showTab(tabName) {
            toggleMenu();
            if (tabName === 'tracker') {
                viewStats.classList.add('hidden');
                viewTracker.classList.remove('hidden');
            } else if (tabName === 'stats') {
                viewTracker.classList.add('hidden');
                viewStats.classList.remove('hidden');
                renderStatistics();
            }
        }

        function startExercise() {
            const selectedExercise = document.getElementById('exercise-dropdown').value;
            activeExercise = { name: selectedExercise, sets: [] };
            setCounter = 1;
            
            currentExerciseTitle.innerText = selectedExercise;
            currentSetNumber.innerText = setCounter;
            
            weightInput.value = "";
            repsInput.value = "";
            
            stepSelect.classList.add('hidden');
            stepLogSet.classList.remove('hidden');
            
            setTimeout(() => weightInput.focus(), 50);
        }

        function cancelExercise() {
            if (activeExercise.sets.length > 0) {
                if (!confirm("Du hast für diese Übung bereits Sätze eingetragen. Möchtest du sie wirklich verwerfen?")) {
                    return;
                }
            }
            
            weightInput.value = "";
            repsInput.value = "";
            
            stepLogSet.classList.add('hidden');
            stepSelect.classList.remove('hidden');
            updateStatusText("Übung abgebrochen. Keine Daten gespeichert.");
        }

        function nextSet() {
            const weight = parseFloat(weightInput.value);
            const reps = parseInt(repsInput.value);

            if (!weight || !reps) {
                alert("Bitte trage Gewicht und Wiederholungen ein.");
                return;
            }

            activeExercise.sets.push({
                setNumber: setCounter,
                weight: weight,
                reps: reps
            });

            setCounter++;
            currentSetNumber.innerText = setCounter;
            
            weightInput.value = "";
            repsInput.value = "";
            weightInput.focus();
            
            updateStatusText(`Satz ${setCounter - 1} gesichert.`);
        }

        function finishExercise() {
            const weight = parseFloat(weightInput.value);
            const reps = parseInt(repsInput.value);
            
            if (weight && reps) {
                activeExercise.sets.push({
                    setNumber: setCounter,
                    weight: weight,
                    reps: reps
                });
            }

            if (activeExercise.sets.length === 0) {
                alert("Es wurden keine Sätze für diese Übung erfasst.");
                return;
            }

            currentWorkout.exercises.push(activeExercise);

            const history = JSON.parse(localStorage.getItem('gym_history')) || [];
            history.push(currentWorkout);
            localStorage.setItem('gym_history', JSON.stringify(history));

            weightInput.value = "";
            repsInput.value = "";

            stepSelect.classList.remove('hidden');
            stepLogSet.classList.add('hidden');

            updateStatusText(`Erfolgreich gespeichert: ${activeExercise.name} (${activeExercise.sets.length} Sätze).`);
        }

        function clearAllData() {
            const dynamicCheck = confirm("🚨 BIST DU DIR SICHER?\n\nDadurch werden ALLE gespeicherten Trainingseinheiten unwiderruflich gelöscht.");
            
            if (dynamicCheck) {
                localStorage.removeItem('gym_history');
                updateStatusText("Speicher wurde komplett geleert.");
                alert("Alle lokalen Daten wurden gelöscht.");
                if (!viewStats.classList.contains('hidden')) {
                    renderStatistics();
                }
            }
        }

        function updateStatusText(text) {
            logStatus.innerText = text;
        }

        function exportData() {
            const data = localStorage.getItem('gym_history');
            if (!data || JSON.parse(data).length === 0) {
                alert("Noch keine Daten im Speicher zum Exportieren vorhanden.");
                return;
            }
            
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gym-data-${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        /* --- STATISTIKEN LOGIK --- */

        function renderStatistics() {
            const container = document.getElementById('stats-container');
            container.innerHTML = '';

            // Bestehende Charts zerstören, um Re-Render-Probleme zu vermeiden
            Object.values(activeCharts).forEach(chart => chart.destroy());
            activeCharts = {};

            const history = JSON.parse(localStorage.getItem('gym_history')) || [];

            if (history.length === 0) {
                container.innerHTML = `<p class="text-slate-500 text-sm text-center py-8">Noch keine Daten vorhanden. Führe erst Übungen aus und speichere sie!</p>`;
                return;
            }

            // Data-Parsing & Gruppierung nach Übungen
            const exerciseMap = {};

            history.forEach(workout => {
                const date = workout.date;
                workout.exercises.forEach(ex => {
                    if (!exerciseMap[ex.name]) {
                        exerciseMap[ex.name] = {
                            count: 0,
                            dataPoints: [] // { date, max1RM, avgWeight, totalReps }
                        };
                    }

                    exerciseMap[ex.name].count += ex.sets.length;

                    // Berechnungen für diesen Tag/Session
                    let max1RM = 0;
                    let totalWeightSum = 0;
                    let totalReps = 0;

                    ex.sets.forEach(set => {
                        const w = set.weight;
                        const r = set.reps;
                        
                        // Epley-Formel für 1RM: w * (1 + r / 30)
                        const estimated1RM = w * (1 + r / 30);
                        if (estimated1RM > max1RM) {
                            max1RM = estimated1RM;
                        }

                        totalWeightSum += w;
                        totalReps += r;
                    });

                    const avgWeight = ex.sets.length > 0 ? (totalWeightSum / ex.sets.length) : 0;

                    exerciseMap[ex.name].dataPoints.push({
                        date: date,
                        max1RM: parseFloat(max1RM.toFixed(1)),
                        avgWeight: parseFloat(avgWeight.toFixed(1)),
                        totalReps: totalReps
                    });
                });
            });

            // Sortieren nach Häufigkeit (Satzanzahl/Einträge absteigend)
            const sortedExercises = Object.keys(exerciseMap).sort((a, b) => exerciseMap[b].count - exerciseMap[a].count);

            sortedExercises.forEach((exName, index) => {
                const exData = exerciseMap[exName];

                // Sortiere Datenpunkte chronologisch nach Datum
                exData.dataPoints.sort((a, b) => new Date(a.date) - new Date(b.date));

                const dates = exData.dataPoints.map(dp => dp.date);
                const rmValues = exData.dataPoints.map(dp => dp.max1RM);
                const avgValues = exData.dataPoints.map(dp => dp.avgWeight);
                const repsValues = exData.dataPoints.map(dp => dp.totalReps);

                // HTML Card erstellen
                const card = document.createElement('div');
                card.className = "bg-slate-800/60 border border-slate-800 rounded-xl p-4 space-y-3";
                
                const canvasId = `chart-${index}`;
                card.innerHTML = `
                    <div class="flex justify-between items-center border-b border-slate-700/50 pb-2">
                        <h3 class="font-bold text-lg text-indigo-400">${exName}</h3>
                        <span class="text-xs bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-2 py-0.5 rounded-full">${exData.count} Sätze geloggt</span>
                    </div>
                    <div class="w-full relative h-64">
                        <canvas id="${canvasId}"></canvas>
                    </div>
                `;
                container.appendChild(card);

                // Chart.js Diagramm zeichnen
                const ctx = document.getElementById(canvasId).getContext('2d');
                activeCharts[canvasId] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: dates,
                        datasets: [
                            {
                                label: 'Max 1RM (kg)',
                                data: rmValues,
                                borderColor: '#818cf8', // Indigo
                                backgroundColor: '#818cf8',
                                borderWidth: 2,
                                tension: 0.2,
                                pointRadius: 4
                            },
                            {
                                label: 'Ø Gewicht (kg)',
                                data: avgValues,
                                borderColor: '#34d399', // Emerald
                                backgroundColor: '#34d399',
                                borderWidth: 2,
                                tension: 0.2,
                                pointRadius: 4
                            },
                            {
                                label: 'Gesamt Wdh.',
                                data: repsValues,
                                borderColor: '#f43f5e', // Rose
                                backgroundColor: '#f43f5e',
                                borderWidth: 2,
                                tension: 0.2,
                                pointRadius: 4
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#94a3b8',
                                    font: { size: 11 }
                                }
                            }
                        },
                        scales: {
                            x: {
                                ticks: { color: '#64748b', font: { size: 10 } },
                                grid: { color: 'rgba(51, 65, 85, 0.3)' }
                            },
                            y: {
                                ticks: { color: '#64748b', font: { size: 10 } },
                                grid: { color: 'rgba(51, 65, 85, 0.3)' }
                            }
                        }
                    }
                });
            });
        }
    </script>
</body>
</html>
